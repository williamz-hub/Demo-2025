<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 Countdown - Demo 2025</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .emoji {
            font-size: 1.5em;
        }

        .subtitle {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .countdown-display {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .countdown-number {
            font-size: 3em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin: 10px 0;
        }

        .countdown-label {
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .current-date {
            font-size: 1.1em;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .fact-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .fact-title {
            font-size: 1.4em;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .fact-text {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #ee5a24, #ff6b6b);
        }

        button:active {
            transform: translateY(0);
        }

        .all-facts {
            text-align: left;
            margin-top: 15px;
        }

        .all-facts li {
            margin: 8px 0;
            padding-left: 10px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .countdown-number {
                font-size: 2.5em;
            }

            .buttons {
                flex-direction: column;
                align-items: center;
            }

            button {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="emoji">🎯</span> 2025 Countdown <span class="emoji">🎯</span></h1>
        <div class="subtitle">Welcome to the future!</div>
        
        <div class="current-date">
            <span class="emoji">📅</span> <span id="currentDate"></span>
        </div>

        <div class="countdown-display">
            <div class="countdown-label" id="countdownLabel">Days since 2025 began:</div>
            <div class="countdown-number" id="countdownNumber">0</div>
            <div id="statusMessage">🌟 We're living in the future!</div>
        </div>

        <div class="fact-section">
            <div class="fact-title"><span class="emoji">💡</span> Did you know?</div>
            <div class="fact-text" id="randomFact">Loading amazing facts about 2025...</div>
            
            <div class="buttons">
                <button onclick="showNewFact()">🔄 New Fact</button>
                <button onclick="toggleAllFacts()">📚 All Facts</button>
                <button onclick="refreshCountdown()">🔃 Refresh</button>
            </div>

            <div id="allFacts" class="all-facts hidden">
                <h3>📚 All 2025 Facts:</h3>
                <ol id="factsList"></ol>
            </div>
        </div>
    </div>

    <script>
        class Countdown2025 {
            constructor() {
                this.targetYear = 2025;
                this.targetDate = new Date(2025, 0, 1); // January 1, 2025
                this.currentDate = new Date();
                this.facts2025 = [
                    "2025 is the International Year of Peace and Trust as declared by the UN.",
                    "2025 marks 80 years since the end of World War II.",
                    "The World Expo 2025 will be held in Osaka, Japan.",
                    "2025 is expected to be a significant year for AI and technology advancement.",
                    "Many countries plan to achieve carbon neutrality goals by 2025.",
                    "2025 is a perfect square year (45²).",
                    "The next leap year after 2025 will be 2028.",
                    "2025 in Roman numerals is MMXXV."
                ];
                this.allFactsVisible = false;
            }

            daysCalculation() {
                const timeDiff = this.targetDate.getTime() - this.currentDate.getTime();
                const daysDiff = Math.floor(timeDiff / (1000 * 3600 * 24));
                
                if (daysDiff > 0) {
                    return {
                        daysUntil2025: daysDiff,
                        daysSince2025: 0,
                        isFuture: true
                    };
                } else {
                    return {
                        daysUntil2025: 0,
                        daysSince2025: Math.abs(daysDiff),
                        isFuture: false
                    };
                }
            }

            getRandomFact() {
                return this.facts2025[Math.floor(Math.random() * this.facts2025.length)];
            }

            updateDisplay() {
                const daysInfo = this.daysCalculation();
                const countdownLabel = document.getElementById('countdownLabel');
                const countdownNumber = document.getElementById('countdownNumber');
                const statusMessage = document.getElementById('statusMessage');
                const currentDate = document.getElementById('currentDate');

                // Update current date
                currentDate.textContent = this.currentDate.toLocaleDateString();

                if (daysInfo.isFuture) {
                    countdownLabel.textContent = "Days until 2025:";
                    countdownNumber.textContent = daysInfo.daysUntil2025;
                    statusMessage.innerHTML = "🚀 2025 is coming!";
                } else {
                    if (daysInfo.daysSince2025 === 0) {
                        countdownLabel.textContent = "Welcome to 2025!";
                        countdownNumber.textContent = "🎉";
                        statusMessage.innerHTML = "🎉 Today is the day! 🎉";
                    } else {
                        countdownLabel.textContent = "Days since 2025 began:";
                        countdownNumber.textContent = daysInfo.daysSince2025;
                        statusMessage.innerHTML = "🌟 We're living in the future!";
                    }
                }
            }

            showRandomFact() {
                const factElement = document.getElementById('randomFact');
                factElement.textContent = this.getRandomFact();
            }

            populateAllFacts() {
                const factsList = document.getElementById('factsList');
                factsList.innerHTML = '';
                
                this.facts2025.forEach((fact, index) => {
                    const li = document.createElement('li');
                    li.textContent = fact;
                    factsList.appendChild(li);
                });
            }

            toggleAllFacts() {
                const allFactsElement = document.getElementById('allFacts');
                this.allFactsVisible = !this.allFactsVisible;
                
                if (this.allFactsVisible) {
                    this.populateAllFacts();
                    allFactsElement.classList.remove('hidden');
                } else {
                    allFactsElement.classList.add('hidden');
                }
            }

            refresh() {
                this.currentDate = new Date();
                this.updateDisplay();
                this.showRandomFact();
                // Hide all facts if visible
                if (this.allFactsVisible) {
                    this.toggleAllFacts();
                }
            }
        }

        // Global instance
        let countdown;

        // Initialize when page loads
        window.addEventListener('DOMContentLoaded', function() {
            countdown = new Countdown2025();
            countdown.updateDisplay();
            countdown.showRandomFact();
        });

        // Global functions for buttons
        function showNewFact() {
            countdown.showRandomFact();
        }

        function toggleAllFacts() {
            countdown.toggleAllFacts();
        }

        function refreshCountdown() {
            countdown.refresh();
        }

        // Auto refresh every minute
        setInterval(() => {
            countdown.refresh();
        }, 60000);
    </script>
</body>
</html>
