<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator Demo - Demo-2025</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            margin-bottom: 5px;
        }

        .range-value {
            color: #667eea;
            font-weight: bold;
            font-size: 1.1em;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            transform: scale(1.2);
            accent-color: #667eea;
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin: 20px 0;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
        }

        .password-output {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            position: relative;
        }

        .password-text {
            font-family: 'Courier New', monospace;
            font-size: 1.2em;
            word-break: break-all;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .strength-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .strength-bar {
            flex: 1;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .strength-weak { background: #dc3545; }
        .strength-medium { background: #ffc107; }
        .strength-strong { background: #28a745; }

        .strength-text {
            font-weight: 600;
            min-width: 60px;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s ease;
        }

        .copy-btn:hover {
            background: #5a67d8;
        }

        .feedback {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            border-radius: 5px;
            padding: 10px;
            margin-top: 10px;
            font-size: 0.9em;
            color: #1976d2;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
            
            .checkbox-group {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Password Generator</h1>
            <p>Create secure passwords instantly</p>
        </div>

        <div class="form-group">
            <label for="length">Password Length: <span class="range-value" id="lengthValue">12</span></label>
            <input type="range" id="length" min="4" max="50" value="12">
        </div>

        <div class="form-group">
            <label>Character Types:</label>
            <div class="checkbox-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="uppercase" checked>
                    <label for="uppercase">Uppercase (A-Z)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="lowercase" checked>
                    <label for="lowercase">Lowercase (a-z)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="digits" checked>
                    <label for="digits">Digits (0-9)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="special" checked>
                    <label for="special">Special (!@#$...)</label>
                </div>
            </div>
        </div>

        <button class="generate-btn" onclick="generatePassword()">Generate Password</button>

        <div class="password-output hidden" id="passwordOutput">
            <button class="copy-btn" onclick="copyPassword()">Copy</button>
            <div class="password-text" id="passwordText"></div>
            <div class="strength-indicator">
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <span class="strength-text" id="strengthText"></span>
            </div>
            <div class="feedback hidden" id="feedback"></div>
        </div>
    </div>

    <script>
        // Character sets
        const characterSets = {
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            digits: '0123456789',
            special: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };

        // Update length display
        document.getElementById('length').addEventListener('input', function() {
            document.getElementById('lengthValue').textContent = this.value;
        });

        function generatePassword() {
            const length = parseInt(document.getElementById('length').value);
            const includeUppercase = document.getElementById('uppercase').checked;
            const includeLowercase = document.getElementById('lowercase').checked;
            const includeDigits = document.getElementById('digits').checked;
            const includeSpecial = document.getElementById('special').checked;

            // Validate that at least one character type is selected
            if (!includeUppercase && !includeLowercase && !includeDigits && !includeSpecial) {
                alert('Please select at least one character type!');
                return;
            }

            // Build character pool
            let charPool = '';
            let requiredChars = [];

            if (includeLowercase) {
                charPool += characterSets.lowercase;
                requiredChars.push(getRandomChar(characterSets.lowercase));
            }
            if (includeUppercase) {
                charPool += characterSets.uppercase;
                requiredChars.push(getRandomChar(characterSets.uppercase));
            }
            if (includeDigits) {
                charPool += characterSets.digits;
                requiredChars.push(getRandomChar(characterSets.digits));
            }
            if (includeSpecial) {
                charPool += characterSets.special;
                requiredChars.push(getRandomChar(characterSets.special));
            }

            // Generate remaining characters
            const remainingLength = length - requiredChars.length;
            const passwordChars = [...requiredChars];
            
            for (let i = 0; i < remainingLength; i++) {
                passwordChars.push(getRandomChar(charPool));
            }

            // Shuffle array
            for (let i = passwordChars.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [passwordChars[i], passwordChars[j]] = [passwordChars[j], passwordChars[i]];
            }

            const password = passwordChars.join('');
            displayPassword(password);
        }

        function getRandomChar(charset) {
            return charset.charAt(Math.floor(Math.random() * charset.length));
        }

        function displayPassword(password) {
            const output = document.getElementById('passwordOutput');
            const passwordText = document.getElementById('passwordText');
            
            passwordText.textContent = password;
            output.classList.remove('hidden');
            
            // Calculate and display strength
            const strength = calculateStrength(password);
            updateStrengthIndicator(strength);
        }

        function calculateStrength(password) {
            let score = 0;
            const feedback = [];

            // Length scoring
            if (password.length >= 12) {
                score += 25;
            } else if (password.length >= 8) {
                score += 15;
                feedback.push("Consider using at least 12 characters");
            } else {
                score += 5;
                feedback.push("Password is too short - use at least 8 characters");
            }

            // Character variety scoring
            const hasLower = /[a-z]/.test(password);
            const hasUpper = /[A-Z]/.test(password);
            const hasDigit = /[0-9]/.test(password);
            const hasSpecial = /[!@#$%^&*()_+\-=\[\]{}|;:,.<>?]/.test(password);

            const varietyCount = [hasLower, hasUpper, hasDigit, hasSpecial].filter(Boolean).length;
            score += varietyCount * 15;

            if (varietyCount < 3) {
                feedback.push("Use a mix of uppercase, lowercase, digits, and special characters");
            }

            // Determine strength level
            let strength;
            if (score >= 80) {
                strength = "Strong";
            } else if (score >= 60) {
                strength = "Medium";
            } else {
                strength = "Weak";
            }

            return {
                score,
                strength,
                feedback
            };
        }

        function updateStrengthIndicator(strengthData) {
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');
            const feedback = document.getElementById('feedback');

            // Update strength bar
            strengthFill.style.width = strengthData.score + '%';
            strengthFill.className = 'strength-fill strength-' + strengthData.strength.toLowerCase();
            
            // Update strength text
            strengthText.textContent = strengthData.strength;
            strengthText.className = 'strength-text strength-' + strengthData.strength.toLowerCase();

            // Update feedback
            if (strengthData.feedback.length > 0) {
                feedback.textContent = strengthData.feedback.join('. ');
                feedback.classList.remove('hidden');
            } else {
                feedback.classList.add('hidden');
            }
        }

        function copyPassword() {
            const passwordText = document.getElementById('passwordText').textContent;
            navigator.clipboard.writeText(passwordText).then(() => {
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            }).catch(() => {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = passwordText;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            });
        }

        // Generate initial password
        generatePassword();
    </script>
</body>
</html>
